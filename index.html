    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f0f;
      --bg2:      #161616;
      --bg3:      #1c1c1c;
      --border:   rgba(255,255,255,0.07);
      --border2:  rgba(255,255,255,0.12);
      --text:     #d4d4d4;
      --dim:      #606060;
      --dim2:     #888;
      --green:    #4ec9a0;
      --blue:     #569cd6;
      --purple:   #c586c0;
      --amber:    #ce9178;
      --red:      #f44747;
      --comment:  #6a9955;
      --mono:     'JetBrains Mono', 'Consolas', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      overflow: hidden;
    }

    .window {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      animation: fadeIn 0.4s ease both;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

    /* titlebar */
    .titlebar {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      gap: 8px;
      user-select: none;
    }
    .dots { display: flex; gap: 6px; }
    .dot  { width: 12px; height: 12px; border-radius: 50%; }
    .d-r  { background: #ff5f57; }
    .d-y  { background: #ffbd2e; }
    .d-g  { background: #28c840; }
    .titlebar-name { flex: 1; text-align: center; font-size: 12px; color: var(--dim2); letter-spacing: 0.03em; }

    /* layout */
    .body {
      display: grid;
      grid-template-columns: 220px 1fr;
      flex: 1;
      overflow: hidden;
    }

    /* ── sidebar (VS Code explorer style) ── */
    .sidebar {
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      user-select: none;
    }
    .sidebar::-webkit-scrollbar { width: 3px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); }

    .ex-panel-title {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px 8px 16px;
      font-size: 11px; font-weight: 500;
      color: var(--dim2); letter-spacing: 0.08em; text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .ex-section { flex-shrink: 0; }
    .ex-section-header {
      display: flex; align-items: center; gap: 4px;
      padding: 4px 8px 4px 6px;
      font-size: 11px; font-weight: 500;
      color: var(--text); letter-spacing: 0.04em; text-transform: uppercase;
      cursor: pointer;
      background: none; border: none; width: 100%;
      font-family: var(--mono); text-align: left;
    }
    .ex-section-header:hover { background: rgba(255,255,255,0.03); }
    .ex-chevron { font-size: 10px; color: var(--dim2); transition: transform 0.15s; flex-shrink: 0; }
    .ex-section.collapsed .ex-chevron { transform: rotate(-90deg); }
    .ex-section.collapsed .ex-body { display: none; }

    .ex-item {
      display: flex; align-items: center; gap: 5px;
      padding: 2px 0 2px 0;
      padding-left: var(--indent, 22px);
      font-size: 13px; color: var(--dim2);
      cursor: pointer;
      background: none; border: none; width: 100%;
      font-family: var(--mono); text-align: left;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 22px; height: 22px;
    }
    .ex-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .ex-item.active { background: rgba(86,156,214,0.15); color: #c8d4e8; }
    .ex-item.active .ex-icon { color: #9cdcfe; }
    .ex-icon { font-size: 14px; flex-shrink: 0; }
    .ex-icon.folder  { color: #dcb67a; }
    .ex-icon.file-sh { color: var(--green); }
    .ex-icon.file-md { color: var(--blue); }
    .ex-icon.file-py { color: #3572a5; }
    .ex-icon.file-ts { color: #2f74c0; }
    .ex-icon.wip     { color: var(--dim); }

    .ex-subitem { --indent: 38px; }
    .ex-badge {
      margin-left: auto; margin-right: 8px;
      font-size: 10px; padding: 1px 5px; border-radius: 3px;
      background: rgba(255,255,255,0.07); color: var(--dim2);
      flex-shrink: 0;
    }

    .ex-env {
      margin-top: auto;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .ex-env-row {
      display: flex; align-items: center; gap: 6px;
      padding: 3px 12px 3px 16px;
      font-size: 11px; color: var(--dim);
      line-height: 20px;
    }
    .ex-env-row span { margin-left: auto; color: var(--dim2); font-size: 11px; }

    /* terminal */
    .terminal {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }
    .output {
      flex: 1;
      padding: 32px 40px;
      overflow-y: auto;
      font-size: 14px;
      line-height: 1.9;
      max-width: 760px;
    }
    .output::-webkit-scrollbar { width: 3px; }
    .output::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .ln { display: block; white-space: pre-wrap; word-break: break-word; }
    .ln.cmd     { color: var(--comment); font-size: 12px; margin-bottom: 20px; }
    .ln.head    { color: #e0e0e0; font-size: 15px; font-weight: 500; margin-bottom: 6px; }
    .ln.sub     { color: var(--dim2); font-size: 12px; margin-bottom: 20px; }
    .ln.label   { color: var(--blue); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; margin: 24px 0 8px; }
    .ln.body    { color: #b8b8b8; }
    .ln.proj    { color: var(--green); font-weight: 500; margin-top: 24px; }
    .ln.ptag    { color: var(--dim2); font-size: 12px; margin-bottom: 4px; }
    .ln.link    { color: var(--blue); font-size: 12px; margin-top: 4px; }
    .ln.rule    { color: var(--border2); }
    .ln.gap     { display: block; height: 8px; }
    .ln.err     { color: var(--red); }
    .ln.ok      { color: var(--green); }
    .ln.nf      { color: #b8b8b8; }
    .ln.nf::before { content: ''; }
    .ln.dim2    { color: var(--dim); }

    /* cursor blink on last line while typing */
    .cursor {
      display: inline-block;
      width: 7px; height: 14px;
      background: var(--text);
      vertical-align: middle;
      margin-left: 1px;
      animation: blink 1.1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }

    /* chips */
    .chips { display: flex; flex-wrap: wrap; gap: 5px; padding: 8px 20px 10px; border-top: 1px solid var(--border); }
    .chip {
      font-size: 11px; padding: 3px 10px;
      border: 1px solid var(--border2); border-radius: 4px;
      color: var(--dim2); background: none;
      font-family: var(--mono); cursor: pointer;
      transition: all 0.12s;
    }
    .chip:hover { border-color: rgba(255,255,255,0.22); color: var(--text); background: rgba(255,255,255,0.04); }

    /* input */
    .input-row {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 20px;
      border-top: 1px solid var(--border);
    }
    .prompt-sig { font-size: 12px; color: var(--comment); white-space: nowrap; }
    .cmd-in {
      flex: 1; background: none; border: none; outline: none;
      font-family: var(--mono); font-size: 13px; color: var(--text);
      caret-color: var(--green);
    }
    .cmd-in::placeholder { color: var(--dim); }

    @media (max-width: 540px) {
      .body { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }
  </style>
</head>

/* ─── renderer ──────────────────────────────────────────────── */
const out   = document.getElementById('out');
const inp   = document.getElementById('cmdin');
const chips = document.getElementById('chips');
let busy = false;
let cursorEl = null;
let timer = null;

function cancelRender() {
  if (timer) { clearTimeout(timer); timer = null; }
  removeCursor();
  busy = false;
}

function clearOutput() {
  cancelRender();
  out.innerHTML = '';
}

function removeCursor() {
  if (cursorEl && cursorEl.parentNode) cursorEl.parentNode.removeChild(cursorEl);
  cursorEl = null;
}

/* URL patterns that should become real links */
const LINK_RE = /((https?:\/\/|→\s*)([\w.-]+\.(dev|com|net|io|dev)[\w/.-]*))/gi;

function addLine(type, text) {
  removeCursor();
  if (type === 'gap') {
    const sp = document.createElement('div');
    sp.className = 'ln gap';
    out.appendChild(sp);
    return sp;
  }
  const el = document.createElement('div');
  el.className = 'ln ' + (type || '');

  /* linkify link lines */
  if (type === 'link' || type === 'ptag') {
    const urlRe = /([\w.-]+\.(dev|com|net|io)(\/[\w/.-]*)?)/g;
    let last = 0, m;
    while ((m = urlRe.exec(text)) !== null) {
      if (m.index > last) el.appendChild(document.createTextNode(text.slice(last, m.index)));
      const a = document.createElement('a');
      a.href = m[0].startsWith('http') ? m[0] : 'https://' + m[0];
      a.textContent = m[0];
      a.target = '_blank';
      a.rel = 'noopener';
      a.style.cssText = 'color:var(--blue);text-decoration:underline;text-underline-offset:3px;';
      el.appendChild(a);
      last = m.index + m[0].length;
    }
    if (last < text.length) el.appendChild(document.createTextNode(text.slice(last)));
  } else {
    el.textContent = text;
  }

  /* make project names in the list clickable */
  if (type === 'proj') {
    const key = projectKey(text);
    if (PROJECTS[key]) {
      el.style.cursor = 'pointer';
      el.addEventListener('click', () => openProject(key));
      const hint = document.createElement('span');
      hint.style.cssText = 'font-size:11px;color:var(--blue);margin-left:10px;opacity:0.6;';
      hint.textContent = '↵ expand';
      el.appendChild(hint);
    }
  }

  out.appendChild(el);
  out.scrollTop = out.scrollHeight;
  return el;
}

function typeLine(type, text, speed) {
  return new Promise(resolve => {
    removeCursor();
    const el = document.createElement('div');
    el.className = 'ln ' + (type || '');
    out.appendChild(el);

    cursorEl = document.createElement('span');
    cursorEl.className = 'cursor';
    el.appendChild(cursorEl);

    let i = 0;
    function tick() {
      if (i < text.length) {
        el.insertBefore(document.createTextNode(text[i++]), cursorEl);
        out.scrollTop = out.scrollHeight;
        timer = setTimeout(tick, speed + (Math.random() * speed * 0.3));
      } else {
        removeCursor();
        resolve();
      }
    }
    tick();
  });
}

function render(lines, opts = {}) {
  busy = true;
  const delay = opts.lineDelay ?? 32;

  let idx = 0;
  function next() {
    if (idx >= lines.length) { busy = false; return; }
    const [type, text] = lines[idx++];
    if (idx === 1) {
      typeLine(type, text, 22).then(() => { timer = setTimeout(next, delay); });
    } else {
      addLine(type, text);
      timer = setTimeout(next, delay);
    }
  }
  next();
}

/* ─── chips ──────────────────────────────────────────────────── */
function setChips(list) {
  chips.innerHTML = '';
  list.forEach(({ label, cmd }) => {
    const b = document.createElement('button');
    b.className = 'chip';
    b.textContent = label;
    b.onclick = () => run(cmd || label);
    chips.appendChild(b);
  });
}

/* ─── project key normalizer ─────────────────────────────────── */
function projectKey(text) {
  const t = text.toLowerCase().replace(/\s*\(wip\)/, '').trim();
  if (t.includes('tinygrad')) return 'tinygrad';
  if (t.includes('patchwork')) return 'patchwork';
  if (t.includes('chess')) return 'chess';
  if (t.includes('context')) return 'context-window';
  return t;
}

/* ─── navigation ─────────────────────────────────────────────── */
function sec(key) {
  clearOutput();
  setActiveItem(key);
  const projectChips = key === 'projects'
    ? [
        { label: 'open tinygrad',       cmd: 'open tinygrad' },
        { label: 'open patchwork',      cmd: 'open patchwork' },
        { label: 'open chess-rl',       cmd: 'open chess' },
        { label: 'open context-window', cmd: 'open context-window' },
      ]
    : [];
  const baseChips = [
    { label: 'projects', cmd: 'projects' },
    { label: 'git log',  cmd: 'git log'  },
    { label: 'help',     cmd: 'help'     },
  ];
  setChips([...projectChips, ...baseChips]);
  render(SECTIONS[key]);
}

function openProject(key) {
  if (!PROJECTS[key]) return;
  clearOutput();
  setActiveItem('projects');
  setChips([
    { label: '← back to projects', cmd: 'projects' },
    { label: 'open tinygrad',       cmd: 'open tinygrad' },
    { label: 'open patchwork',      cmd: 'open patchwork' },
    { label: 'open chess-rl',       cmd: 'open chess' },
    { label: 'open context-window', cmd: 'open context-window' },
  ]);
  render(PROJECTS[key]);
}

function run(raw) {
  const c = raw.trim().toLowerCase();
  if (!c) return;
  if (c === 'clear') { clearOutput(); setChips(defaultChips()); return; }
  if (SECTIONS[c]) { sec(c); return; }
  const m = c.match(/^open\s+(.+)$/);
  if (m) {
    const k = projectKey(m[1]);
    if (PROJECTS[k]) { openProject(k); return; }
  }
  if (CMDS[c]) {
    clearOutput();
    setChips([{ label: 'projects', cmd: 'projects' }, { label: 'help', cmd: 'help' }]);
    render(CMDS[c]);
    return;
  }
  clearOutput();
  addLine('cmd', '$ ' + raw);
  addLine('err', 'command not found: ' + raw);
  addLine('body', 'try "help" to see available commands');
  addLine('gap', '');
}

function defaultChips() {
  return ['about','projects','skills','writing','contact'].map(s => ({ label: s, cmd: s }));
}

/* ─── command history ────────────────────────────────────────── */
const history = [];
let histIdx = -1;
let histDraft = '';

/* ─── tab completion ─────────────────────────────────────────── */
const ALL_CMDS = [
  'about', 'projects', 'skills', 'writing', 'contact',
  'help', 'git log', 'clear',
  'open tinygrad', 'open patchwork', 'open chess-rl', 'open context-window',
];

function tabComplete(partial) {
  if (!partial) return null;
  const p = partial.toLowerCase();
  const match = ALL_CMDS.filter(c => c.startsWith(p));
  if (match.length === 1) return match[0];
  if (match.length > 1) {
    // find longest common prefix
    let prefix = match[0];
    for (const m of match) {
      while (!m.startsWith(prefix)) prefix = prefix.slice(0, -1);
    }
    return prefix !== p ? prefix : null;
  }
  return null;
}

/* ─── sidebar helpers ────────────────────────────────────────── */
function toggleSection(id) {
  document.getElementById(id).classList.toggle('collapsed');
}

function toggleProjects(btn) {
  const tree = document.getElementById('projects-tree');
  const icon = btn.querySelector('.ex-icon');
  const open = tree.style.display === 'none';
  tree.style.display = open ? 'block' : 'none';
  icon.textContent = open ? '▾' : '▸';
  if (open) sec('projects', btn);
}

function setActiveItem(secKey) {
  document.querySelectorAll('.ex-item').forEach(el => el.classList.remove('active'));
  const match = document.querySelector(`.ex-item[data-sec="${secKey}"]`);
  if (match) match.classList.add('active');
}

inp.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const v = inp.value.trim();
    inp.value = '';
    histIdx = -1;
    histDraft = '';
    if (!v) return;
    if (history[0] !== v) history.unshift(v);
    if (history.length > 50) history.pop();
    run(v);
    return;
  }

  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx === -1) histDraft = inp.value;
    if (histIdx < history.length - 1) {
      histIdx++;
      inp.value = history[histIdx];
      requestAnimationFrame(() => inp.setSelectionRange(inp.value.length, inp.value.length));
    }
    return;
  }

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) {
      histIdx--;
      inp.value = history[histIdx];
    } else if (histIdx === 0) {
      histIdx = -1;
      inp.value = histDraft;
    }
    requestAnimationFrame(() => inp.setSelectionRange(inp.value.length, inp.value.length));
    return;
  }

  if (e.key === 'Tab') {
    e.preventDefault();
    const completed = tabComplete(inp.value);
    if (completed) {
      inp.value = completed;
      /* flash the input briefly to show completion fired */
      inp.style.color = 'var(--green)';
      setTimeout(() => inp.style.color = '', 180);
    }
    return;
  }
});

/* ─── global keyboard shortcuts ─────────────────────────────── */
const SEC_KEYS = ['about', 'projects', 'skills', 'writing', 'contact'];
let lastSec = null;

document.addEventListener('keydown', e => {
  if (document.activeElement === inp) return; // let input handle its own keys
  const n = parseInt(e.key);
  if (n >= 1 && n <= 5) { sec(SEC_KEYS[n - 1]); lastSec = SEC_KEYS[n - 1]; return; }
  if (e.key === 'Escape') {
    if (lastSec) sec(lastSec);
    else sec('about');
    return;
  }
});

// also track lastSec on normal navigation
const _origSec = sec;
// patch openProject so Esc always returns to projects
const _origOpenProject = openProject;
window.openProject = function(key) {
  lastSec = 'projects';
  _origOpenProject(key);
};
